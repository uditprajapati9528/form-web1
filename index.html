<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
}
.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
}
input, button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}
button {
  background: blue;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>Student Form</h2>

  <form action="https://script.google.com/macros/s/AKfycby8nRyE03dlJCicjII7gEHJEe64pHdrO6WWSisVVPg8y3voeH4eZ2a1hsVoeJufsoqv6A/exec" method="POST" target="hidden_iframe" onsubmit="submitted=true;">

    <input name="name" placeholder="Name" required>
    <input name="phone" placeholder="Phone" required>

    <div class="g-recaptcha" data-sitekey="6Le7J6EsAAAAAAYcYb0MXA423JsbdTu5IyG7CK5o"></div>

    <button type="submit">Submit</button>

  </form>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<script>
var submitted = false;

document.querySelector("iframe").onload = function(){
  if(submitted){
    window.location.href = "thankyou.html";
  }
};
</script>

</body>
</html>
