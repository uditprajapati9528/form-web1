<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  margin: 0;
}

.container {
  max-width: 400px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: blue;
  color: white;
  border: none;
}

</style>
</head>

<body>

<div class="container">
  <h2>Student Form</h2>

  <form action="https://script.google.com/macros/s/AKfycbykyD9byCkjFGor4GshUpa20QMW5gcJwCiqG2KBqzc8fuqCmU3gM2wXyJqwpbSbm0YF/exec" method="POST" onsubmit="redirectPage()">
<input type="hidden" name="key" value="MY_SECRET_123">
    <input name="name" placeholder="Full Name" required>
    <input name="phone" placeholder="Phone" required>
    <input name="email" placeholder="Email">
    <textarea name="address" placeholder="Address"></textarea>

    <input name="country" value="India">
    <input name="state" placeholder="State">
    <input name="district" placeholder="District">
    <input name="village" placeholder="Village">

    <select name="profession">
      <option>Student</option>
      <option>Job</option>
      <option>Business</option>
    </select>
<div class="g-recaptcha" data-sitekey="6Lc25KAsAAAAAL-YJRwLim0x2pfwyBgXoKCwXFJl"></div>
    <button type="submit">Submit</button>

  </form>
</div>
<script>
function redirectPage(){
  setTimeout(() => {
    window.location.href = "thankyou.html";
  }, 500);
}
</script>
</body>
</html>
